apiVersion: v1
kind: ConfigMap
metadata:
  name: rush-config
  namespace: rush
data:
  # Mounted into each pod at /config/config.yaml. Data-layer host/port values
  # target in-cluster service names — adjust for managed services if needed.
  config.yaml: |
    env: k8s
    postgres:
      host: postgres
      port: 5432
      name: delivery_engine
      user: postgres
      sslmode: disable
    redis:
      addr: redis:6379
      db: 0
    kafka:
      brokers:
        - kafka:9092
      group_id: delivery-engine
    services:
      order_port: 8080
      rider_port: 8081
      location_port: 8083
      notify_port: 8085
    rate_limit:
      orders_per_minute: 5
    auth:
      ttl_hours: 24
