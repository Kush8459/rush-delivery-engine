apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: rush
  labels: { app: order-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: order-service
          image: rush/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
          envFrom:
            - secretRef: { name: rush-secrets }
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: rush-config
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: rush
spec:
  selector: { app: order-service }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
