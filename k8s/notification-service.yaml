apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: rush
  labels: { app: notification-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: notification-service
          image: rush/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8085, name: http }]
          env:
            - { name: CONFIG_PATH, value: /config/config.yaml }
          envFrom:
            - secretRef: { name: rush-secrets }
          volumeMounts:
            - { name: config, mountPath: /config }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: rush-config
            items: [{ key: config.yaml, path: config.yaml }]
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: rush
spec:
  sessionAffinity: ClientIP
  selector: { app: notification-service }
  ports:
    - { name: http, port: 8085, targetPort: 8085 }
