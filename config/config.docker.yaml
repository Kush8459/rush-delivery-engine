# Used when services run inside the docker-compose network.
# Host/port values are the compose service names + container-internal ports.

env: docker

postgres:
  host: postgres
  port: 5432
  name: delivery_engine
  user: postgres
  password: postgres
  sslmode: disable

redis:
  addr: redis:6379
  password: ""
  db: 0

kafka:
  brokers:
    - kafka:29092
  group_id: delivery-engine

services:
  order_port: 8080
  rider_port: 8081
  location_port: 8083
  notify_port: 8085

rate_limit:
  orders_per_minute: 5

auth:
  jwt_secret: dev-only-secret-change-me
  ttl_hours: 24

telemetry:
  enabled: true
  otlp_endpoint: jaeger:4318
